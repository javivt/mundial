<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Mundial 2026</title>
    <style>
        /* Diseño oscuro, limpio y moderno */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #00d26a; /* Verde cancha de futbol */
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .tracker-container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Estilo del menú desplegable por país */
        details {
            background-color: #1e1e1e;
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        details[open] {
            border-color: #00d26a;
        }

        summary {
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            outline: none;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::after {
            content: '+';
            color: #00d26a;
            font-size: 1.2em;
        }

        details[open] summary::after {
            content: '-';
        }

        /* Cuadrícula de estampas */
        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        /* Estilo individual de la estampa */
        .sticker {
            aspect-ratio: 3 / 4;
            background-color: #2a2a2a;
            border: 2px dashed #555;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .sticker:hover {
            transform: scale(1.1);
        }

        /* Estado: Estampa conseguida */
        .sticker.collected {
            background-color: #00d26a;
            color: #000;
            border: 2px solid #00d26a;
            box-shadow: 0 0 10px rgba(0, 210, 106, 0.5);
        }
    </style>
</head>
<body>

    <div class="tracker-container">
        <h1>ÁLBUM MUNDIAL 2026</h1>

        <!-- País: Argentina -->
        <details>
            <summary>Argentina</summary>
            <div class="stickers-grid" id="grid-ARG">
                <!-- Se generarán con JavaScript para no escribir 20 divs a mano -->
            </div>
        </details>

        <!-- País: Brasil -->
        <details>
            <summary>Brasil</summary>
            <div class="stickers-grid" id="grid-BRA">
                <!-- Se generarán con JavaScript -->
            </div>
        </details>
        
        <!-- País: México -->
        <details>
            <summary>México</summary>
            <div class="stickers-grid" id="grid-MEX">
                <!-- Se generarán con JavaScript -->
            </div>
        </details>
    </div>

    <script>
        // Función para generar las estampas automáticamente
        function generateStickers(countryCode, totalStickers) {
            const grid = document.getElementById(`grid-${countryCode}`);
            
            for (let i = 1; i <= totalStickers; i++) {
                const stickerDiv = document.createElement('div');
                stickerDiv.classList.add('sticker');
                stickerDiv.textContent = i; // Solo el número de la estampa
                
                // Evento para cambiar de estado (conseguida / no conseguida)
                stickerDiv.addEventListener('click', function() {
                    this.classList.toggle('collected');
                });

                grid.appendChild(stickerDiv);
            }
        }

        // Generamos 20 estampas para cada país
        generateStickers('ARG', 20);
        generateStickers('BRA', 20);
        generateStickers('MEX', 20);
    </script>
</body>
</html>
