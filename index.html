<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Mundial 2026</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #00d26a; 
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .tracker-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .group-details {
            background-color: #1e1e1e;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
            overflow: hidden;
        }

        /* Color especial para la pestaña de Especiales */
        .group-details.especiales .group-summary {
            color: #ffea00;
            border-bottom: 1px solid #ffea00;
        }
        
        .group-details.especiales .team-details {
            border-left: 4px solid #ffea00;
        }

        .group-summary {
            font-size: 1.6em;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            padding: 15px 20px;
            background-color: #161616;
            color: #00d26a;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-summary::-webkit-details-marker { display: none; }
        .group-summary::after { content: '▼'; font-size: 0.7em; transition: transform 0.3s; }
        .group-details[open] > .group-summary::after { transform: rotate(180deg); }

        .team-details {
            background-color: #252525;
            margin: 10px 15px;
            border-radius: 6px;
            border-left: 4px solid #00d26a;
        }

        .team-summary {
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            list-style: none;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .team-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding-right: 15px;
        }

        .counter {
            background-color: #333;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.9em;
            color: #00d26a;
        }
        
        .group-details.especiales .counter {
            color: #ffea00;
        }

        .team-summary::-webkit-details-marker { display: none; }
        .team-summary::after { content: '+'; font-size: 1.2em; }
        .team-details[open] > .team-summary::after { content: '-'; }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 12px;
            padding: 15px;
            background-color: #1a1a1a;
            border-top: 1px solid #333;
        }

        .sticker {
            aspect-ratio: 3 / 4;
            background-color: #333;
            border: 2px dashed #555;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em; /* Letra un poco más chica para que quepan prefijos como FWC */
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            color: #aaa;
            text-align: center;
        }

        .sticker:hover { transform: scale(1.08); }

        .sticker.collected {
            background-color: #00d26a;
            color: #000;
            border: 2px solid #00d26a;
            box-shadow: 0 0 10px rgba(0, 210, 106, 0.4);
        }

        /* Color dorado para las estampas especiales conseguidas */
        .group-details.especiales .sticker.collected {
            background-color: #ffea00;
            border-color: #ffea00;
            box-shadow: 0 0 10px rgba(255, 234, 0, 0.4);
        }

    </style>
</head>
<body>

    <div class="tracker-container">
        <h1>Tracker Mundial 2026</h1>
        <div id="album-container"></div>
    </div>

    <script>
        // Función auxiliar para generar automáticamente los números de las estampas
        // Ejemplo: generate(20) -> ["1", "2", ... "20"]
        // Ejemplo: generate(14, "C") -> ["C1", "C2", ... "C14"]
        const generateStickers = (count, prefix = "") => {
            return Array.from({length: count}, (_, i) => `${prefix}${i + 1}`);
        };

        // Nueva estructura de datos súper flexible
        const tournamentData = {
            "🌟 Especiales": {
                "Panini": ["00"],
                "FIFA World Cup (FWC)": generateStickers(19, "FWC "), // Puse 18 por poner un número, ajustalo a las que vengan en el álbum
                "Coca-Cola": generateStickers(14, "C")
            },
            "Grupo A": {
                "México": generateStickers(20),
                "Sudáfrica": generateStickers(20),
                "Corea del Sur": generateStickers(20),
                "Rep. Checa": generateStickers(20)
            },
            "Grupo B": {
                "Canadá": generateStickers(20),
                "Bosnia y Herzegovina": generateStickers(20),
                "Catar": generateStickers(20),
                "Suiza": generateStickers(20)
            },
            "Grupo C": {
                "Brasil": generateStickers(20),
                "Marruecos": generateStickers(20),
                "Haití": generateStickers(20),
                "Escocia": generateStickers(20)
            },
            "Grupo D": {
                "Estados Unidos": generateStickers(20),
                "Paraguay": generateStickers(20),
                "Australia": generateStickers(20),
                "Turquía": generateStickers(20)
            },
            "Grupo E": {
                "Alemania": generateStickers(20),
                "Curazao": generateStickers(20),
                "Costa de Marfil": generateStickers(20),
                "Ecuador": generateStickers(20)
            },
            "Grupo F": {
                "Países Bajos": generateStickers(20),
                "Japón": generateStickers(20),
                "Suecia": generateStickers(20),
                "Túnez": generateStickers(20)
            },
            "Grupo G": {
                "Bélgica": generateStickers(20),
                "Egipto": generateStickers(20),
                "Irán": generateStickers(20),
                "Nueva Zelanda": generateStickers(20)
            },
            "Grupo H": {
                "España": generateStickers(20),
                "Cabo Verde": generateStickers(20),
                "Arabia Saudita": generateStickers(20),
                "Uruguay": generateStickers(20)
            },
            "Grupo I": {
                "Francia": generateStickers(20),
                "Senegal": generateStickers(20),
                "Irak": generateStickers(20),
                "Noruega": generateStickers(20)
            },
            "Grupo J": {
                "Argentina": generateStickers(20),
                "Argelia": generateStickers(20),
                "Austria": generateStickers(20),
                "Jordania": generateStickers(20)
            },
            "Grupo K": {
                "Portugal": generateStickers(20),
                "RD Congo": generateStickers(20),
                "Uzbekistán": generateStickers(20),
                "Colombia": generateStickers(20)
            },
            "Grupo L": {
                "Inglaterra": generateStickers(20),
                "Croacia": generateStickers(20),
                "Ghana": generateStickers(20),
                "Panamá": generateStickers(20)
            }
        };

        const container = document.getElementById('album-container');
        let savedStickers = JSON.parse(localStorage.getItem('mundial26_stickers')) || {};

        // Renderizar todo
        for (const [groupName, teams] of Object.entries(tournamentData)) {
            
            const groupDetails = document.createElement('details');
            groupDetails.className = 'group-details';
            
            // Si es el grupo de especiales, le damos un estilo distinto (dorado)
            if(groupName === "🌟 Especiales") {
                groupDetails.classList.add('especiales');
            }

            groupDetails.innerHTML = `<summary class="group-summary">${groupName}</summary>`;

            for (const [teamName, stickersArray] of Object.entries(teams)) {
                const teamDetails = document.createElement('details');
                teamDetails.className = 'team-details';
                
                const totalStickersForTeam = stickersArray.length;
                let collectedCount = 0;

                // Contar cuántas tenemos de este equipo/sección
                stickersArray.forEach(stickerLabel => {
                    if (savedStickers[`${teamName}-${stickerLabel}`]) collectedCount++;
                });

                const teamSummary = document.createElement('summary');
                teamSummary.className = 'team-summary';
                teamSummary.innerHTML = `
                    <div class="team-info">
                        <span>${teamName}</span>
                        <span class="counter" id="counter-${teamName}">${collectedCount}/${totalStickersForTeam}</span>
                    </div>
                `;

                const grid = document.createElement('div');
                grid.className = 'stickers-grid';

                // Generar cada cuadrito
                stickersArray.forEach(stickerLabel => {
                    const stickerId = `${teamName}-${stickerLabel}`;
                    const stickerDiv = document.createElement('div');
                    stickerDiv.className = 'sticker';
                    stickerDiv.textContent = stickerLabel;

                    if (savedStickers[stickerId]) {
                        stickerDiv.classList.add('collected');
                    }

                    stickerDiv.addEventListener('click', function() {
                        this.classList.toggle('collected');
                        const isCollected = this.classList.contains('collected');
                        
                        savedStickers[stickerId] = isCollected;
                        localStorage.setItem('mundial26_stickers', JSON.stringify(savedStickers));

                        const counterSpan = document.getElementById(`counter-${teamName}`);
                        let currentCount = parseInt(counterSpan.textContent.split('/')[0]);
                        currentCount = isCollected ? currentCount + 1 : currentCount - 1;
                        counterSpan.textContent = `${currentCount}/${totalStickersForTeam}`;
                    });

                    grid.appendChild(stickerDiv);
                });

                teamDetails.appendChild(teamSummary);
                teamDetails.appendChild(grid);
                groupDetails.appendChild(teamDetails);
            }

            container.appendChild(groupDetails);
        }
    </script>
</body>
</html>
