<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Mundial - Estilo Brasil 2014</title>
    <style>
        /* Paleta Brasil 2014: Azul Cobalto, Amarillo Vibrante y Verde */
        body {
            background-color: #002776; /* Azul bandera */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            color: #FFDF00; /* Amarillo Brasil */
            font-weight: 900;
            font-size: 2.2em;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .tracker-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .group-details {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px solid #009c3b; /* Verde Brasil */
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .group-details.especiales {
            border-color: #FFDF00;
        }

        .group-details.especiales .group-summary {
            background-color: rgba(255, 223, 0, 0.1);
            color: #FFDF00;
        }
        
        .group-details.especiales .team-details {
            border-left: 4px solid #FFDF00;
        }

        .group-summary {
            font-size: 1.5em;
            font-weight: 800;
            cursor: pointer;
            list-style: none;
            padding: 18px 20px;
            background: #009c3b;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
        }

        .group-summary::-webkit-details-marker { display: none; }
        .group-summary::after { content: '▼'; font-size: 0.7em; transition: transform 0.3s; color: rgba(255,255,255,0.8); }
        .group-details[open] > .group-summary::after { transform: rotate(180deg); color: #fff; }

        .team-details {
            background: rgba(0, 0, 0, 0.2);
            margin: 12px 15px;
            border-radius: 8px;
            border-left: 4px solid #FFDF00;
            transition: background 0.3s;
        }

        .team-details:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .team-summary {
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            list-style: none;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .team-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding-right: 15px;
        }

        .counter {
            background: #FFDF00;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            color: #002776;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .team-summary::-webkit-details-marker { display: none; }
        .team-summary::after { content: '+'; font-size: 1.2em; font-weight: bold; color: rgba(255,255,255,0.5); }
        .team-details[open] > .team-summary::after { content: '-'; color: #FFDF00; }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 12px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        .sticker {
            aspect-ratio: 3 / 4;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px dashed rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        .sticker:hover { transform: scale(1.08); background-color: rgba(255, 255, 255, 0.2); }

        /* Estampa conseguida: Verde vibrante */
        .sticker.collected {
            background: #009c3b;
            color: #fff;
            border: 1px solid #009c3b;
            box-shadow: 0 0 10px rgba(0, 156, 59, 0.6);
            transform: scale(1.05);
        }

        /* Especiales conseguidas: Amarillo vibrante */
        .group-details.especiales .sticker.collected {
            background: #FFDF00;
            color: #002776;
            border: 1px solid #FFDF00;
            box-shadow: 0 0 10px rgba(255, 223, 0, 0.6);
        }

        /* SECCIÓN DE PROGRESO GLOBAL */
        .progress-section {
            background: rgba(0, 0, 0, 0.4);
            padding: 25px;
            border-radius: 12px;
            margin-top: 40px;
            margin-bottom: 40px;
            border: 2px solid #FFDF00;
            text-align: center;
        }

        .progress-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #FFDF00;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .progress-bar-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            height: 30px;
            margin-top: 15px;
            overflow: hidden;
            border: 2px solid #009c3b;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .progress-bar-fill {
            height: 100%;
            background: #FFDF00;
            width: 0%; /* Se actualiza con JS */
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .progress-stats {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.2em;
            color: #ffffff;
        }

    </style>
</head>
<body>

    <div class="tracker-container">
        <h1>Álbum Mundial 2026</h1>
        <div id="album-container"></div>

        <!-- Nueva Gráfica de Progreso -->
        <div class="progress-section">
            <div class="progress-title">Progreso del Álbum</div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="global-progress-fill"></div>
            </div>
            <div class="progress-stats" id="global-progress-text">0 / 0 estampas (0%)</div>
        </div>
    </div>

    <script>
        const generateStickers = (count, prefix = "") => {
            return Array.from({length: count}, (_, i) => `${prefix}${i + 1}`);
        };

        const tournamentData = {
            "🌟 Especiales": {
                "Panini": ["00"],
                "FIFA World Cup (FWC)": generateStickers(18, "FWC "), 
                "Coca-Cola": generateStickers(14, "C")
            },
            "Grupo A": {
                "México": generateStickers(20),
                "Sudáfrica": generateStickers(20),
                "Corea del Sur": generateStickers(20),
                "Rep. Checa": generateStickers(20)
            },
            "Grupo B": {
                "Canadá": generateStickers(20),
                "Bosnia y Herzegovina": generateStickers(20),
                "Catar": generateStickers(20),
                "Suiza": generateStickers(20)
            },
            "Grupo C": {
                "Brasil": generateStickers(20),
                "Marruecos": generateStickers(20),
                "Haití": generateStickers(20),
                "Escocia": generateStickers(20)
            },
            "Grupo D": {
                "Estados Unidos": generateStickers(20),
                "Paraguay": generateStickers(20),
                "Australia": generateStickers(20),
                "Turquía": generateStickers(20)
            },
            "Grupo E": {
                "Alemania": generateStickers(20),
                "Curazao": generateStickers(20),
                "Costa de Marfil": generateStickers(20),
                "Ecuador": generateStickers(20)
            },
            "Grupo F": {
                "Países Bajos": generateStickers(20),
                "Japón": generateStickers(20),
                "Suecia": generateStickers(20),
                "Túnez": generateStickers(20)
            },
            "Grupo G": {
                "Bélgica": generateStickers(20),
                "Egipto": generateStickers(20),
                "Irán": generateStickers(20),
                "Nueva Zelanda": generateStickers(20)
            },
            "Grupo H": {
                "España": generateStickers(20),
                "Cabo Verde": generateStickers(20),
                "Arabia Saudita": generateStickers(20),
                "Uruguay": generateStickers(20)
            },
            "Grupo I": {
                "Francia": generateStickers(20),
                "Senegal": generateStickers(20),
                "Irak": generateStickers(20),
                "Noruega": generateStickers(20)
            },
            "Grupo J": {
                "Argentina": generateStickers(20),
                "Argelia": generateStickers(20),
                "Austria": generateStickers(20),
                "Jordania": generateStickers(20)
            },
            "Grupo K": {
                "Portugal": generateStickers(20),
                "RD Congo": generateStickers(20),
                "Uzbekistán": generateStickers(20),
                "Colombia": generateStickers(20)
            },
            "Grupo L": {
                "Inglaterra": generateStickers(20),
                "Croacia": generateStickers(20),
                "Ghana": generateStickers(20),
                "Panamá": generateStickers(20)
            }
        };

        const container = document.getElementById('album-container');
        let savedStickers = JSON.parse(localStorage.getItem('mundial26_stickers')) || {};
        
        // Variables para la gráfica de progreso global
        let totalGlobalStickers = 0;
        let collectedGlobalStickers = 0;

        // Función para actualizar la gráfica visualmente
        function updateGlobalProgress() {
            const fillElement = document.getElementById('global-progress-fill');
            const textElement = document.getElementById('global-progress-text');
            
            const percentage = totalGlobalStickers === 0 ? 0 : Math.round((collectedGlobalStickers / totalGlobalStickers) * 100);
            
            fillElement.style.width = `${percentage}%`;
            textElement.textContent = `${collectedGlobalStickers} / ${totalGlobalStickers} estampas (${percentage}%)`;
        }

        // Renderizar todo y calcular totales
        for (const [groupName, teams] of Object.entries(tournamentData)) {
            const groupDetails = document.createElement('details');
            groupDetails.className = 'group-details';
            
            if(groupName === "🌟 Especiales") {
                groupDetails.classList.add('especiales');
            }

            groupDetails.innerHTML = `<summary class="group-summary">${groupName}</summary>`;

            for (const [teamName, stickersArray] of Object.entries(teams)) {
                const teamDetails = document.createElement('details');
                teamDetails.className = 'team-details';
                
                const totalStickersForTeam = stickersArray.length;
                let collectedCount = 0;

                // Sumar al total global del álbum
                totalGlobalStickers += totalStickersForTeam;

                stickersArray.forEach(stickerLabel => {
                    const stickerId = `${teamName}-${stickerLabel}`;
                    if (savedStickers[stickerId]) {
                        collectedCount++;
                        collectedGlobalStickers++; // Sumar a las conseguidas globales
                    }
                });

                const teamSummary = document.createElement('summary');
                teamSummary.className = 'team-summary';
                teamSummary.innerHTML = `
                    <div class="team-info">
                        <span>${teamName}</span>
                        <span class="counter" id="counter-${teamName}">${collectedCount}/${totalStickersForTeam}</span>
                    </div>
                `;

                const grid = document.createElement('div');
                grid.className = 'stickers-grid';

                stickersArray.forEach(stickerLabel => {
                    const stickerId = `${teamName}-${stickerLabel}`;
                    const stickerDiv = document.createElement('div');
                    stickerDiv.className = 'sticker';
                    stickerDiv.textContent = stickerLabel;

                    if (savedStickers[stickerId]) {
                        stickerDiv.classList.add('collected');
                    }

                    stickerDiv.addEventListener('click', function() {
                        this.classList.toggle('collected');
                        const isCollected = this.classList.contains('collected');
                        
                        savedStickers[stickerId] = isCollected;
                        localStorage.setItem('mundial26_stickers', JSON.stringify(savedStickers));

                        // Actualizar contador del equipo
                        const counterSpan = document.getElementById(`counter-${teamName}`);
                        let currentCount = parseInt(counterSpan.textContent.split('/')[0]);
                        currentCount = isCollected ? currentCount + 1 : currentCount - 1;
                        counterSpan.textContent = `${currentCount}/${totalStickersForTeam}`;

                        // Actualizar contador global y gráfica
                        isCollected ? collectedGlobalStickers++ : collectedGlobalStickers--;
                        updateGlobalProgress();
                    });

                    grid.appendChild(stickerDiv);
                });

                teamDetails.appendChild(teamSummary);
                teamDetails.appendChild(grid);
                groupDetails.appendChild(teamDetails);
            }

            container.appendChild(groupDetails);
        }

        // Llamada inicial para pintar la barra la primera vez que se abre la página
        updateGlobalProgress();
    </script>
</body>
</html>
